<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Año bisiesto</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #cfd9df, #e2ebf0);
    text-align: center;
    padding: 50px;
}

.contenedor {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    margin: auto;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

input {
    padding: 10px;
    width: 80%;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-bottom: 15px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background-color: #2196F3;
    color: white;
    cursor: pointer;
}

button:hover {
    background-color: #1976D2;
}

#resultado {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="contenedor">
    <h2>¿Es año bisiesto?</h2>

    <input type="number" id="anio" placeholder="Ingresa un año">

    <br>

    <button onclick="verificar()">Verificar</button>

    <p id="resultado"></p>
</div>

<script>
function verificar() {
    let anio = parseInt(document.getElementById("anio").value);
    let resultado = document.getElementById("resultado");

    if (isNaN(anio)) {
        resultado.textContent = "Ingrese un año válido";
        resultado.style.color = "black";
        return;
    }

    if ((anio % 4 === 0 && anio % 100 !== 0) || (anio % 400 === 0)) {
        resultado.textContent = "🟢 Es un año bisiesto";
        resultado.style.color = "green";
    } else {
        resultado.textContent = "🔴 No es un año bisiesto";
        resultado.style.color = "red";
    }
}
</script>

</body>
</html>
